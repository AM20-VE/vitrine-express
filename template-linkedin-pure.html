<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <style>
        :root {
            --color-dark: #07240c;
            --color-background-light: #f6f7f2; 
            --color-accent: #15eb80; 
            --font-main: 'Jost', 'Quicksand', system-ui, sans-serif;
            --radius: 8px; 
            --radius-organic: 60% 40% 70% 30% / 50% 30% 70% 50%;
            --li-bg: #f4f2ee;
            --li-border: #e0e0e0;
            --li-text-main: rgba(0,0,0,0.9);
            --li-text-sub: rgba(0,0,0,0.6);
            --li-link: #0a66c2;
            --slate-border: #cbd5e1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--li-bg); padding: 40px 0; display: flex; flex-direction: column;         align-items: center; min-height: 100vh; color: var(--color-dark); }
        .li-mockup-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 12px; }
        .li-card { background: white; border-radius: 10px; border: 1px solid var(--li-border); overflow: hidden; width: 100%; }
        .li-profile-content { padding: 0 24px 24px 24px; position: relative; font-family: system-ui, sans-serif; }
        .li-avatar-mockup { width: 152px; height: 152px; border-radius: 50%; border: 4px solid white; background: #F3F4F7; margin-top: -90px; position: relative; z-index: 25; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .li-profile-info { margin-top: 12px; }
        .li-name { font-size: 24px; font-weight: 600; color: var(--li-text-main); }
        .li-headline { font-size: 16px; color: var(--li-text-main); margin-top: 4px; }
        .li-subline { font-size: 14px; color: var(--li-text-sub); margin-top: 4px; }
        .li-section-title { font-size: 20px; font-weight: 600; margin: 24px 24px 16px 24px; color: var(--li-text-main); font-family: system-ui, sans-serif; }
        .vignettes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 24px 24px 24px; }
        .vignette-card-container { border: 1px solid var(--slate-border); border-radius: 12px; overflow: hidden; background: white; display: flex; flex-direction: column; }
        .vignette-badge { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--li-text-sub); border-bottom: 1px solid var(--li-border); font-family: system-ui, sans-serif; }
        .vignette-description { padding: 12px; background: white; border-top: 1px solid var(--li-border); font-family: system-ui, sans-serif; }
        .vignette-desc-title { font-size: 14px; font-weight: 600; color: var(--li-text-main); }
        .vignette-desc-sub { font-size: 12px; color: var(--li-text-sub); }
        .banner-wrapper, .vignette-wrapper { width: 100%; background: var(--color-background-light); overflow: hidden; position: relative; }
        #linkedin-banner, .vignette { overflow: hidden; position: absolute; top: 0; left: 0; transform-origin: top left; }
        #linkedin-banner::before, .vignette::before { content: ""; position: absolute; width: 500px; height: 400px; top: -150px; left: -100px; border: 1px solid var(--color-accent); border-radius: var(--radius-organic); opacity: 0.4; z-index: 1; transform: rotate(-10deg); }
        #linkedin-banner::after, .vignette::after { content: ""; position: absolute; width: 500px; height: 400px; bottom: -200px; right: -100px; border: 1px solid var(--color-dark); border-radius: 30% 70% 40% 60% / 60% 40% 60% 40%; box-shadow: inset -20px -20px 0 rgba(44, 28, 59, 0.03); opacity: 0.2; z-index: 1; transform: rotate(15deg); }
        #linkedin-banner { width: 1584px; height: 396px; background-color: var(--color-background-light); display: flex; flex-direction: column; justify-content: center; text-align: center; padding: 0 120px 0 550px; }
        .li-logo-container { position: absolute; top: 40px; left: 40px; height: 100px; width: fit-content; display: flex; align-items: center; z-index: 20; }
        .li-logo-text { background: white; color: var(--color-dark); padding: 10px 20px; border: 1px solid rgba(7, 36, 12, 0.1); border-radius: var(--radius); font-weight: 600; text-transform: uppercase; font-size: 1.4rem; height: 80px; line-height: 40px; text-align: center;}
         .li-logo-img { max-height: 100%; max-width: 100%; object-fit: contain; border-radius: var(--radius); }
        .banner-title { position: relative; z-index: 10; color: var(--color-dark); font-size: 58px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 60px; max-width: 900px; }
        .banner-key-figures { position: relative; z-index: 10; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; max-width: 850px; }
        .key-item { padding: 0 5px 10px 5px; border-bottom: 1px solid rgba(44, 28, 59, 0.15); min-width: 150px; font-size: 1.2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--color-dark); }
        .key-item::before { content: "●"; color: var(--color-accent); font-size: 1.2rem; margin-right: 10px; } 
        .vignette { width: 1200px; height: 627px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px; }
        .v1-light { background-color: var(--color-background-light); }
        .v2-dark { background-color: var(--color-background-light) !important; }
        .vignette-title { position: relative; z-index: 10; font-size: 68px; font-weight: 500; margin-bottom: 60px; letter-spacing: -0.02em; line-height: 1.1; width: 100%; }
        .cta-mimic { position: relative; z-index: 10; height: 80px; line-height: 50px; padding: 0 20px; background: var(--color-dark); color: white; border-radius: 100px; font-weight: 500; font-size: 32px; border: none; text-align: center; display: block; min-width: 400px;}
        .v2-dark .cta-mimic { background: var(--color-accent); color: var(--color-dark); font-weight: 700; }
        .v2-dark::after { border-color: var(--color-accent) !important; }
        .bottom-right-icon { position: absolute; bottom: 80px; right: 120px; z-index: 2; opacity: 0.4; }
        @media (max-width: 768px) { 
            .li-card { border-radius: 0; border-left: none; border-right: none; }
            .li-avatar-mockup { width: 100px !important; height: 100px !important; margin-top: -55px !important; }
            .vignettes-grid { grid-template-columns: 1fr; padding: 16px; } }
        body.is-preview .li-logo-text { line-height: 55px; }
        body.is-preview .cta-mimic { line-height: 80px; }
        body.is-preview .banner-title { margin-bottom: 25px; }
    </style>
</head>
<body class="is-preview">
<div class="li-mockup-container"> 
    <div class="li-card">
        <div class="banner-wrapper" id="b-wrap">
            <div id="linkedin-banner">
                <div id="li-logo-slot" class="li-logo-container"></div>
                <h1 class="banner-title" id="li-title"></h1>
                <div id="li-figures" class="banner-key-figures"></div>
            </div>
        </div>
        <div class="li-profile-content">
            <div class="li-avatar-mockup">
                <svg viewBox="0 0 160 160"><path d="M80 0a80 80 0 1080 80A80 80 0 0080 0zm0 32a24 24 0 11-24 24 24 24 0 0124-24zm38 88a2 2 0 01-2 2H44a2 2 0 01-2-2v-4a28 28 0 0128-28h20a28 28 0 0128 28z" fill="#D9DADB"></path></svg>
            </div>
            <div class="li-profile-info">
                <div class="li-name">Ton nom</div>
                <div class="li-headline">Expertise | Solution | Résultats</div>
                <div class="li-subline">Paris, France • <span style="color:var(--li-link); font-weight:600;">Coordonnées</span></div>
                <div class="li-headline"><span style="color:var(--li-link); font-weight:600;">+500 relations</span></div>
            </div>
        </div>
    </div>
    <div class="li-card">
        <h2 class="li-section-title">Sélection</h2>
        <div class="vignettes-grid">  
            <div class="vignette-card-container">
                <div class="vignette-badge">Lien</div>
                <div class="vignette-wrapper" id="v1-wrap">
                    <div id="v1" class="vignette v1-light">
                        <h2 class="vignette-title" id="v1-title"></h2>
                        <div class="cta-mimic" id="v1-cta"></div>
                        <div class="bottom-right-icon">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </div>
                    </div>
                </div>
                <div class="vignette-description">
                    <div class="vignette-desc-title">Réserver un appel</div>
                    <div class="vignette-desc-sub">Calendly.com</div>
                </div>
            </div>
            <div class="vignette-card-container">
                <div class="vignette-badge">Lien</div>
                <div class="vignette-wrapper" id="v2-wrap">
                    <div id="v2" class="vignette v2-dark">
                        <h2 class="vignette-title" id="v2-title"></h2>
                        <div class="cta-mimic" id="v2-cta"></div>
                        <div class="bottom-right-icon">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                    </div>
                </div>
                <div class="vignette-description">
                    <div class="vignette-desc-title">Nos services</div>
                    <div class="vignette-desc-sub">tonsite.com</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script id="export-data" type="application/json">/*CONFIG_EXPORT*/</script>
<script>
    function rescale() {
        const bWrap = document.getElementById('b-wrap');
        const v1Wrap = document.getElementById('v1-wrap');
        const v2Wrap = document.getElementById('v2-wrap');
        if(bWrap) {
            const bScale = bWrap.offsetWidth / 1584;
            const banner = document.getElementById('linkedin-banner');
            if(banner) {
                banner.style.transform = `scale(${bScale})`;
                bWrap.style.height = (396 * bScale) + 'px';
            }
        }
        if(v1Wrap && v2Wrap) {
            const vScale = v1Wrap.offsetWidth / 1200;
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            if(v1) v1.style.transform = `scale(${vScale})`;
            if(v2) v2.style.transform = `scale(${vScale})`;
            const vHeight = (627 * vScale) + 'px';
            v1Wrap.style.height = vHeight;
            v2Wrap.style.height = vHeight;
        }
    }
    function updateUI(data) {
        const config = data.config || data; 
        if(!config) return;
        if (config.colors) {
            const r = document.documentElement.style;
            r.setProperty('--color-accent', config.colors.accent);
            r.setProperty('--color-dark', config.colors.dark);
            r.setProperty('--color-background-light', config.colors.bgLight);
        }
        const logoSlot = document.getElementById('li-logo-slot');
        if (logoSlot) {
            logoSlot.innerHTML = '';
            const h = config.header || {};
            if (h.useTextOnly || !h.logo) {
                const txt = document.createElement('div');
                txt.className = 'li-logo-text';
                txt.textContent = h.companyName || "VITRINE-EXPRESS";
                logoSlot.appendChild(txt);
            } else {
                const img = document.createElement('img');
                img.src = h.logo; 
                img.className = 'li-logo-img';
                logoSlot.appendChild(img);
            }
        }
        const kit = config.linkedinKit || {};
        const hero = config.hero || {};
        const bannerTitle = kit.bannerTitle || hero.title || "";
        const titleEl = document.getElementById('li-title');
        if(titleEl) titleEl.textContent = bannerTitle;
        const figCont = document.getElementById('li-figures');
        if (figCont) {
            figCont.innerHTML = '';
            const figures = kit.figures || hero.figures || [];
            figures.forEach(f => {
                if(f.label) {
                    const item = document.createElement('div');
                    item.className = 'key-item';
                    item.textContent = f.label.toUpperCase();
                    figCont.appendChild(item);
                }
            });
        }
        const v1TitleEl = document.getElementById('v1-title');
        const v1CtaEl = document.getElementById('v1-cta');
        if(v1TitleEl) v1TitleEl.textContent = kit.vignette1Title || config.vignette1Title || "Contact";
        if(v1CtaEl) v1CtaEl.textContent = kit.vignette1Cta || (config.contact ? config.contact.ctaLabel : "PRENDRE RDV");
        const v2TitleEl = document.getElementById('v2-title');
        const v2CtaEl = document.getElementById('v2-cta');
        if(v2TitleEl) v2TitleEl.textContent = kit.vignette2Title || config.vignette2Title || "Mon univers";
        if(v2CtaEl) v2CtaEl.textContent = kit.vignette2Cta || "VOIR L'OFFRE";
        rescale();
    }
    window.onload = () => {
        rescale();
        const exportData = document.getElementById('export-data');
        if (exportData && exportData.textContent.trim() !== "" && exportData.textContent.indexOf('/*CONFIG_EXPORT*/') === -1) {
            try {
                const savedConfig = JSON.parse(exportData.textContent);
                updateUI(savedConfig);
            } catch (e) {
                console.error("Erreur de lecture", e);
            }
        }
        if (window.parent) {
            window.parent.postMessage({ type: 'GET_CONFIG' }, '*');
        }
    };
    window.addEventListener('message', (e) => {
        if(e.data.type === 'UPDATE_CONFIG' || e.data.type === 'SET_INITIAL_CONFIG') {
            updateUI(e.data.config);
        }
    });
    window.onresize = rescale;
</script>
</body>
</html>
