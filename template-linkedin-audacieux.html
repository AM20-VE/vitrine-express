<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <style>
        :root {
            --color-dark: #222222;
            --color-background-light: #f5f5dc;
            --color-accent: #ffbf00; 
            --font-main: 'Arial Black', system-ui, sans-serif;
            --radius: 0px;
            --li-bg: #f4f2ee;
            --li-border: #e0e0e0;
            --li-text-main: rgba(0,0,0,0.9);
            --li-text-sub: rgba(0,0,0,0.6);
            --li-link: #0a66c2;
            --slate-border: #cbd5e1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--li-bg); padding: 40px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .li-mockup-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 12px; }
        .li-card { background: white; border-radius: 10px; border: 1px solid var(--li-border); overflow: hidden; width: 100%; }
        .li-profile-content { padding: 0 24px 24px 24px; position: relative; font-family: system-ui, sans-serif; }
        .li-avatar-mockup { width: 152px; height: 152px; border-radius: 50%; border: 4px solid white; background: #F3F4F7; margin-top: -90px; position: relative; z-index: 25; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .li-profile-info { margin-top: 12px; }
        .li-name { font-size: 24px; font-weight: 600; color: var(--li-text-main); }
        .li-headline { font-size: 16px; color: var(--li-text-main); margin-top: 4px; }
        .li-subline { font-size: 14px; color: var(--li-text-sub); margin-top: 4px; }
        .li-section-title { font-size: 20px; font-weight: 600; margin: 24px 24px 16px 24px; color: var(--li-text-main); font-family: system-ui, sans-serif; }
        .vignettes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 24px 24px 24px; }
        .vignette-card-container { border: 1px solid var(--slate-border); border-radius: 12px; overflow: hidden; background: white; display: flex; flex-direction: column; }
        .vignette-badge { padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--li-text-sub); border-bottom: 1px solid var(--li-border); display: flex; align-items: center; gap: 6px; font-family: system-ui, sans-serif; }
        .vignette-description { padding: 12px; background: white; border-top: 1px solid var(--li-border); font-family: system-ui, sans-serif; }
        .vignette-desc-title { font-size: 14px; font-weight: 600; color: var(--li-text-main); }
        .vignette-desc-sub { font-size: 12px; color: var(--li-text-sub); }
        .banner-wrapper, .vignette-wrapper { width: 100%; background: white; border: 8px solid var(--color-dark); overflow: hidden; position: relative; }
        #linkedin-banner, .vignette { position: absolute; top: 0; left: 0; transform-origin: top left; overflow: hidden; }
        .decor-svg-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bottom-right-icon { position: absolute; bottom: 100px; right: 100px; z-index: 10; transform: rotate(-10deg); }
        .li-logo-container { position: absolute; top: 40px; left: 60px; height: 110px; z-index: 20; display: flex; align-items: center; justify-content: center; }
        .li-logo-text { background: white; color: var(--color-dark); padding: 0 30px; border: 6px solid var(--color-dark); font-weight: 900; text-transform: uppercase; font-size: 18px; height: 100px; line-height: 70px; text-align: center; }
        .li-logo-img { max-height: 100%; border: 6px solid var(--color-dark); background: white; padding: 5px; }
        #linkedin-banner { width: 1584px; height: 396px; background-color: var(--color-background-light); padding-left: 520px; padding-right: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .banner-title { position: relative; z-index: 10; color: var(--color-dark); background: white; border: 6px solid var(--color-dark); padding: 15px 30px; font-size: 32px; font-weight: 900; text-transform: uppercase; height: 200px; line-height: 60px; text-align: center; margin-bottom: 30px; } 
        .banner-key-figures { display: flex; gap: 25px; position: relative; z-index: 10; }
        .key-item { background: var(--color-dark); height: 70px; line-height: 45px; padding: 0 30px; border: 3px solid var(--color-accent); color: white; font-weight: 900; font-size: 22px; text-transform: uppercase; white-space: nowrap; }
        .vignette { width: 1200px; height: 627px; background-color: var(--color-background-light); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 80px; }
        .vignette-title { position: relative; z-index: 10; color: var(--color-dark); background: white; border: 6px solid var(--color-dark); padding: 15px 30px; font-size: 50px; font-weight: 900; text-transform: uppercase; height: 180px; line-height: 55px; justify-content: center; align-items: center; margin-bottom: 60px; text-align: center; width: 800px; }
        .title-wrapper {position: relative; width: fit-content; }
        .title-shadow-fixed { position: absolute; top: 12px; left: 12px; width: 100%; height: 90%; background: var(--color-dark); z-index: 1; }
        .banner-title, .vignette-title { position: relative; z-index: 2; }
        .cta-wrapper { position: relative; z-index: 10; width: fit-content; margin: 0 auto; }
        .cta-mimic { position: relative; z-index: 2; min-width: 450px; height: 130px; line-height: 80px; background: var(--color-accent); color: var(--color-dark); border: 8px solid var(--color-dark); font-weight: 900; font-size: 44px; text-transform: uppercase; text-align: center; display: block; padding: 0 50px; }
        .cta-shadow-fixed { position: absolute; top: 12px; left: 12px; width: 100%; height: 100%; background: var(--color-dark); z-index: 1; }
        .v2-dark { background-color: var(--color-dark) !important; }
        .v2-dark .cta-mimic { background: var(--color-accent); }
        .v2-dark .cta-shadow-fixed { background: white; }
        @media (max-width: 768px) { 
            .li-card { border-radius: 0; border: none; }
            .li-avatar-mockup { width: 80px !important; height: 80px !important; margin-top: -55px !important; border-width: 3px !important; }
            .vignettes-grid { grid-template-columns: 1fr; padding: 16px; gap: 12px; }
            .li-profile-content { padding: 16px; }
            .li-section-title { margin: 16px; }
        }
        body.is-preview .key-item { line-height: 65px; }
        body.is-preview .banner-title { line-height: 80px; }
        body.is-preview .li-logo-text { line-height: 90px; }
        body.is-preview .cta-mimic { line-height: 120px; }
        body.is-preview .vignette-title { line-height: 70px; }
    </style>
</head>
<body class="is-preview">
<div class="li-mockup-container"> 
    <div class="li-card">
        <div class="banner-wrapper" id="b-wrap">
            <div id="linkedin-banner">
                <svg class="decor-svg-bg">
                    <defs>
                        <pattern id="stripes" patternUnits="userSpaceOnUse" width="20" height="30" patternTransform="rotate(-45)">
                            <line x1="0" y1="0" x2="0" y2="30" stroke="var(--color-accent)" stroke-width="15" opacity="0.3" />
                        </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#stripes)" />
                    <path d="M200 396 L1584 396 L1584 200 Z" fill="var(--color-dark)" />
                </svg>
                <div id="li-logo-slot" class="li-logo-container"></div>
                <div class="title-wrapper">
                    <div class="title-shadow-fixed"></div>
                    <h1 class="banner-title" id="li-title"></h1>
                </div>
                <div id="li-figures" class="banner-key-figures"></div>
            </div>
        </div>
        <div class="li-profile-content">
            <div class="li-avatar-mockup">
                <svg viewBox="0 0 160 160"><path d="M80 0a80 80 0 1080 80A80 80 0 0080 0zm0 32a24 24 0 11-24 24 24 24 0 0124-24zm38 88a2 2 0 01-2 2H44a2 2 0 01-2-2v-4a28 28 0 0128-28h20a28 28 0 0128 28z" fill="#D9DADB"></path></svg>
            </div>
            <div class="li-profile-info">
                <div class="li-name">Ton nom</div>
                <div class="li-headline">Expertise | Solution | Résultats</div>
                <div class="li-subline">Paris, France • <span style="color:var(--li-link); font-weight:600;">Coordonnées</span></div>
                <div class="li-headline"><span style="color:var(--li-link); font-weight:600;">+500 relations</span></div>
            </div>
        </div>
    </div>
    <div class="li-card">
        <h2 class="li-section-title">Sélection</h2>
        <div class="vignettes-grid">  
            <div class="vignette-card-container">
                <div class="vignette-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Lien</div>
                <div class="vignette-wrapper" id="v1-wrap">
                    <div id="v1" class="vignette">
                        <svg class="decor-svg-bg">
                            <defs>
                                <pattern id="stripes2" patternUnits="userSpaceOnUse" width="20" height="30" patternTransform="rotate(-45)">
                                    <line x1="0" y1="0" x2="0" y2="30" stroke="var(--color-accent)" stroke-width="15" opacity="0.3" />
                                </pattern>
                            </defs>
                            <rect width="100%" height="100%" fill="url(#stripes2)" />
                        </svg>
                        <h2 class="vignette-title" id="v1-title"></h2>
                        <div class="cta-wrapper">
                            <div class="cta-shadow-fixed"></div>
                            <div class="cta-mimic" id="v1-cta"></div>
                        </div>
                        <div class="bottom-right-icon">
                            <svg width="120" height="120" viewBox="0 0 24 24" fill="white" stroke="var(--color-dark)" stroke-width="2" style="filter: drop-shadow(8px 8px 0px var(--color-dark));">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="vignette-description">
                    <div class="vignette-desc-title">Prendre rendez-vous</div>
                    <div class="vignette-desc-sub">Calendly.com</div>
                </div>
            </div>
            <div class="vignette-card-container">
                <div class="vignette-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Lien</div>
                <div class="vignette-wrapper" id="v2-wrap">
                    <div id="v2" class="vignette v2-dark">
                        <h2 class="vignette-title" id="v2-title">Découvrir le système complet</h2>
                        <div class="cta-wrapper">
                            <div class="cta-shadow-fixed"></div>
                            <div class="cta-mimic" id="v2-cta"></div>
                        </div>
                        <div class="bottom-right-icon">
                            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2" style="filter: drop-shadow(4px 4px 0px var(--color-accent));">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="vignette-description">
                    <div class="vignette-desc-title">Découvrir l'offre</div>
                    <div class="vignette-desc-sub">tonsite.com</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script id="export-data" type="application/json">/*CONFIG_EXPORT*/</script>
<script>
    function rescale() {
        const bWrap = document.getElementById('b-wrap');
        const v1Wrap = document.getElementById('v1-wrap');
        const v2Wrap = document.getElementById('v2-wrap');
        if(bWrap) {
            const bScale = bWrap.offsetWidth / 1584;
            const banner = document.getElementById('linkedin-banner');
            if(banner) {
                banner.style.transform = `scale(${bScale})`;
                bWrap.style.height = (396 * bScale) + 'px';
            }
        }
        if(v1Wrap && v2Wrap) {
            const vScale = v1Wrap.offsetWidth / 1200;
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            if(v1) v1.style.transform = `scale(${vScale})`;
            if(v2) v2.style.transform = `scale(${vScale})`;
            const vHeight = (627 * vScale) + 'px';
            v1Wrap.style.height = vHeight;
            v2Wrap.style.height = vHeight;
        }
    }
    function updateUI(data) {
        const config = data.config || data; 
        if(!config) return;
        if (config.colors) {
            const r = document.documentElement.style;
            r.setProperty('--color-accent', config.colors.accent);
            r.setProperty('--color-dark', config.colors.dark);
            r.setProperty('--color-background-light', config.colors.bgLight);
        }
        const logoSlot = document.getElementById('li-logo-slot');
        if (logoSlot) {
            logoSlot.innerHTML = '';
            const h = config.header || {};
            if (h.useTextOnly || !h.logo) {
                const txt = document.createElement('div');
                txt.className = 'li-logo-text';
                txt.textContent = h.companyName || "VITRINE-EXPRESS";
                logoSlot.appendChild(txt);
            } else {
                const img = document.createElement('img');
                img.src = h.logo; 
                img.className = 'li-logo-img';
                logoSlot.appendChild(img);
            }
        }
        const kit = config.linkedinKit || {};
        const hero = config.hero || {};
        const bannerTitle = kit.bannerTitle || hero.title || "";
        const titleEl = document.getElementById('li-title');
        if(titleEl) titleEl.textContent = bannerTitle;
        const figCont = document.getElementById('li-figures');
        if (figCont) {
            figCont.innerHTML = '';
            const figures = kit.figures || hero.figures || [];
            figures.forEach(f => {
                if(f.label) {
                    const item = document.createElement('div');
                    item.className = 'key-item';
                    item.textContent = `✓ ${f.label.toUpperCase()}`;
                    figCont.appendChild(item);
                }
            });
        }
        const v1TitleEl = document.getElementById('v1-title');
        const v1CtaEl = document.getElementById('v1-cta');
        if(v1TitleEl) v1TitleEl.textContent = kit.vignette1Title || config.vignette1Title || "Contact";
        if(v1CtaEl) v1CtaEl.textContent = kit.vignette1Cta || (config.contact ? config.contact.ctaLabel : "PRENDRE RDV");
        const v2TitleEl = document.getElementById('v2-title');
        const v2CtaEl = document.getElementById('v2-cta');
        if(v2TitleEl) v2TitleEl.textContent = kit.vignette2Title || config.vignette2Title || "Mon univers";
        if(v2CtaEl) v2CtaEl.textContent = kit.vignette2Cta || "VOIR L'OFFRE";
        rescale();
    }
    window.onload = () => {
        rescale();
        const exportData = document.getElementById('export-data');
        if (exportData && exportData.textContent.trim() !== "" && exportData.textContent.indexOf('/*CONFIG_EXPORT*/') === -1) {
            try {
                const savedConfig = JSON.parse(exportData.textContent);
                updateUI(savedConfig);
            } catch (e) {
                console.error("Erreur de lecture", e);
            }
        }
        if (window.parent) {
            window.parent.postMessage({ type: 'GET_CONFIG' }, '*');
        }
    };
    window.addEventListener('message', (e) => {
        if(e.data.type === 'UPDATE_CONFIG' || e.data.type === 'SET_INITIAL_CONFIG') {
            updateUI(e.data.config);
        }
    });
    window.onresize = rescale;
</script>
</body>
</html>
